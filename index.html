<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Japon 2026 - Loris &amp; Clément</title>
  <meta name="description" content="Itineraire du voyage au Japon de Loris et Clément, de Osaka a Kumamoto.">
  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://tile.openstreetmap.org">
  <link rel="preconnect" href="https://images.unsplash.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root {
      --ink: #17211d;
      --muted: #5b665f;
      --paper: #fbf7ef;
      --line: #ded5c5;
      --red: #c7462b;
      --blue: #246b86;
      --moss: #4f6f52;
      --gold: #b7852f;
      --white: #fffdf8;
      --shadow: 0 18px 50px rgba(23, 33, 29, 0.14);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      background: var(--paper);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      min-width: 320px;
      background:
        radial-gradient(circle at 10% 30%, rgba(199, 70, 43, 0.08), transparent 26rem),
        linear-gradient(180deg, #fffaf1 0%, #f5efe4 55%, #eef2ee 100%);
    }

    button, a { font: inherit; }

    .topbar {
      position: fixed;
      z-index: 900;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.8rem 1.25rem;
      color: white;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.42), transparent);
      pointer-events: none;
    }

    .brand {
      font-weight: 800;
      text-shadow: 0 1px 12px rgba(0, 0, 0, 0.4);
    }

    .topbar a {
      color: inherit;
      text-decoration: none;
      pointer-events: auto;
      border-bottom: 1px solid rgba(255, 255, 255, 0.6);
    }

    .hero {
      min-height: 72vh;
      display: grid;
      align-items: end;
      padding: 6rem 1.25rem 3rem;
      color: white;
      background:
        linear-gradient(180deg, rgba(14, 19, 18, 0.2) 0%, rgba(14, 19, 18, 0.76) 100%),
        url("https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=1800&q=80") center / cover;
    }

    .hero-inner {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    .kicker {
      margin: 0 0 0.8rem;
      font-size: 0.95rem;
      font-weight: 800;
    }

    h1 {
      max-width: 12ch;
      margin: 0;
      font-family: ui-serif, Georgia, "Times New Roman", serif;
      font-size: 4.8rem;
      line-height: 0.95;
      font-weight: 800;
      text-wrap: balance;
    }

    .hero p {
      max-width: 45rem;
      margin: 1.1rem 0 0;
      font-size: 1.15rem;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.92);
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      margin-top: 1.5rem;
    }

    .stats span {
      padding: 0.55rem 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.38);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(12px);
      font-weight: 750;
    }

    main {
      width: min(1180px, calc(100% - 2rem));
      margin: -1.6rem auto 0;
      padding-bottom: 4rem;
    }

    .route-wrap {
      display: grid;
      grid-template-columns: minmax(320px, 0.92fr) minmax(0, 1fr);
      gap: 1.1rem;
      align-items: start;
    }

    .map-panel {
      position: sticky;
      top: 0.8rem;
      z-index: 10;
      overflow: hidden;
      min-height: 620px;
      border: 1px solid rgba(23, 33, 29, 0.1);
      border-radius: 8px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    #map {
      min-height: 620px;
      background: #dfe7de;
    }

    .map-title {
      position: absolute;
      z-index: 500;
      left: 1rem;
      right: 1rem;
      bottom: 1rem;
      display: grid;
      gap: 0.2rem;
      max-width: 26rem;
      padding: 0.85rem 0.95rem;
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.92);
      box-shadow: 0 10px 28px rgba(23, 33, 29, 0.18);
      backdrop-filter: blur(14px);
    }

    .map-title strong { font-size: 1rem; }
    .map-title span { color: var(--muted); font-size: 0.92rem; line-height: 1.35; }

    .leaflet-container { font: inherit; }
    .leaflet-control-attribution { font-size: 0.65rem; }

    .stop-pin {
      display: grid;
      place-items: center;
      width: 2rem;
      height: 2rem;
      border: 2px solid white;
      border-radius: 999px;
      color: white;
      background: var(--blue);
      box-shadow: 0 8px 22px rgba(23, 33, 29, 0.3);
      font-size: 0.78rem;
      font-weight: 850;
      transition: transform 160ms ease, background 160ms ease;
    }

    .stop-pin.active {
      transform: scale(1.18);
      background: var(--red);
    }

    .itinerary {
      display: grid;
      gap: 0.85rem;
      padding-bottom: 2rem;
    }

    .day-card {
      border: 1px solid rgba(23, 33, 29, 0.1);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.9);
      box-shadow: 0 10px 28px rgba(23, 33, 29, 0.08);
      overflow: hidden;
      scroll-margin-top: 1.2rem;
    }

    .day-card.active {
      border-color: rgba(199, 70, 43, 0.55);
      box-shadow: 0 16px 42px rgba(199, 70, 43, 0.14);
    }

    .day-head {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 0.85rem;
      padding: 1rem 1rem 0.8rem;
      align-items: start;
    }

    .day-num {
      display: grid;
      place-items: center;
      width: 3.1rem;
      height: 3.1rem;
      border-radius: 8px;
      color: white;
      background: var(--ink);
      font-size: 1.25rem;
      font-weight: 900;
    }

    .day-card.active .day-num { background: var(--red); }

    .day-date {
      color: var(--moss);
      font-size: 0.82rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    h2 {
      margin: 0.2rem 0 0;
      font-size: 1.35rem;
      line-height: 1.18;
    }

    .day-body {
      padding: 0 1rem 1rem 4.95rem;
      color: var(--muted);
      line-height: 1.55;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      margin-top: 0.8rem;
    }

    .chip {
      padding: 0.38rem 0.55rem;
      border-radius: 999px;
      color: var(--ink);
      background: #efe6d6;
      font-size: 0.78rem;
      font-weight: 750;
    }

    .chip.blue { background: rgba(36, 107, 134, 0.14); }
    .chip.gold { background: rgba(183, 133, 47, 0.16); }
    .chip.red { background: rgba(199, 70, 43, 0.13); }

    footer {
      width: min(1180px, calc(100% - 2rem));
      margin: 0 auto;
      padding: 2rem 0 3rem;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }

    footer strong { color: var(--ink); }

    @media (max-width: 880px) {
      .topbar { padding: 0.7rem 0.9rem; }
      .hero { min-height: 66vh; padding: 5rem 1rem 2.4rem; }
      h1 { font-size: 3.2rem; }
      .hero p { font-size: 1rem; }
      main { width: min(100% - 1rem, 760px); margin-top: -1rem; }
      .route-wrap { grid-template-columns: 1fr; }
      .map-panel {
        top: 0;
        min-height: 48vh;
        max-height: 52vh;
      }
      #map { min-height: 48vh; }
      .map-title { left: 0.7rem; right: 0.7rem; bottom: 0.7rem; }
      .day-card { scroll-margin-top: 52vh; }
      .day-body { padding-left: 1rem; }
    }

    @media (max-width: 520px) {
      .brand { max-width: 12rem; }
      .topbar a { display: none; }
      h1 { font-size: 2.6rem; }
      .stats span { width: 100%; }
      .map-panel, #map { min-height: 45vh; }
      .day-head { grid-template-columns: 1fr; }
      .day-num {
        width: 2.6rem;
        height: 2.6rem;
        font-size: 1.05rem;
      }
      .day-body { padding: 0 1rem 1rem; }
      h2 { font-size: 1.18rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .stop-pin { transition: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">Loris &amp; Clément au Japon</div>
    <a href="#route">Itineraire</a>
  </header>

  <section class="hero" aria-label="Voyage au Japon">
    <div class="hero-inner">
      <p class="kicker">5-17 juillet 2026</p>
      <h1>2 frères 1 voyage</h1>
      <p>13 jours de trains, temples, onsen, velo et ferry: Osaka, Nara, Koya-san, Hiroshima, Shimanami, Shikoku, Beppu, Fukuoka, Aso et Kumamoto.</p>
      <div class="stats" aria-label="Resume du voyage">
        <span>13 jours</span>
        <span>Osaka -> Kumamoto</span>
      </div>
    </div>
  </section>

  <main id="route">
    <div class="route-wrap">
      <aside class="map-panel" aria-label="Carte interactive">
        <div id="map"></div>
        <div class="map-title" aria-live="polite">
          <strong id="mapDay">Jour 1</strong>
          <span id="mapLabel">Osaka -> Dotonbori</span>
        </div>
      </aside>
      <section class="itinerary" id="itinerary" aria-label="Programme jour par jour"></section>
    </div>
  </main>

  <footer>
    Made with love by Loris
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const days = [
      {
        day: 1,
        date: "5 juil",
        title: "Osaka -> Dotonbori",
        text: "Arrivee et installation le matin. Apres-midi a Dotonbori / Namba, a pied ou en metro. Nuit a Osaka.",
        chips: ["Metro 10-30 min", "Gastronomie", "Nuit Osaka"],
        marker: [34.6687, 135.5012],
        points: [[34.6937, 135.5023], [34.6687, 135.5012], [34.6937, 135.5023]]
      },
      {
        day: 2,
        date: "6 juil",
        title: "Osaka -> Nara",
        text: "Depart vers 08:00 pour Nara. Todai-ji et parc pendant 3 a 4 h, puis retour ou nuit sur place.",
        chips: ["30-45 min", "Todai-ji", "Parc de Nara"],
        marker: [34.6851, 135.8048],
        points: [[34.6937, 135.5023], [34.6851, 135.8048], [34.6937, 135.5023]]
      },
      {
        day: 3,
        date: "7 juil",
        title: "Osaka -> Koya-san",
        text: "Nankai Line depuis Namba, funiculaire vers Koya. Apres-midi a Okunoin, shukubo possible.",
        chips: ["2-2.5 h", "Okunoin", "Shukubo"],
        points: [[34.6937, 135.5023], [34.2123, 135.5849]]
      },
      {
        day: 4,
        date: "8 juil",
        title: "Koya-san -> Himeji -> Kobe",
        text: "Retour matinal vers Osaka, puis Himeji pour le chateau. Soiree a Kobe Harborland.",
        chips: ["Train + shinkansen", "Chateau de Himeji", "Nuit Kobe"],
        points: [[34.2123, 135.5849], [34.6937, 135.5023], [34.8151, 134.6854], [34.6901, 135.1955]]
      },
      {
        day: 5,
        date: "9 juil",
        title: "Kobe -> Okayama -> Kurashiki",
        text: "Matin vers Okayama pour Korakuen, puis Kurashiki Bikan en milieu ou fin d'apres-midi.",
        chips: ["1-1.5 h", "Korakuen", "Kurashiki Bikan"],
        points: [[34.6901, 135.1955], [34.6551, 133.9195], [34.585, 133.7719]]
      },
      {
        day: 6,
        date: "10 juil",
        title: "Kurashiki -> Hiroshima",
        text: "Matin sur les canaux de Kurashiki. Apres-midi en train via Okayama vers Hiroshima.",
        chips: ["1.5-2 h", "Canaux", "Nuit Hiroshima"],
        points: [[34.585, 133.7719], [34.6551, 133.9195], [34.3853, 132.4553]]
      },
      {
        day: 7,
        date: "11 juil",
        title: "Hiroshima + Miyajima",
        text: "Matin au Parc Memorial de la Paix. Apres-midi en ferry vers Miyajima.",
        chips: ["Ferry 10-30 min", "Memorial", "Miyajima"],
        marker: [34.2958, 132.3198],
        points: [[34.3853, 132.4553], [34.2958, 132.3198], [34.3853, 132.4553]]
      },
      {
        day: 8,
        date: "12 juil",
        title: "Hiroshima -> Onomichi -> Shimanami",
        text: "Train vers Fukuyama puis Onomichi. Option velo sur une portion de la Shimanami Kaido.",
        chips: ["40-50 min", "Onomichi", "Velo 4 h+"],
        points: [[34.3853, 132.4553], [34.4859, 133.3623], [34.4089, 133.2058], [34.2298, 133.0966]]
      },
      {
        day: 9,
        date: "13 juil",
        title: "Shimanami -> Uchiko / Uwajima",
        text: "Trajet variable train + ferry selon liaison. Journee villages et arrivee dans le sud-ouest de Shikoku.",
        chips: ["3-5 h", "Villages", "Shikoku"],
        points: [[34.2298, 133.0966], [33.5494, 132.6522], [33.2233, 132.5606]]
      },
      {
        day: 10,
        date: "14 juil",
        title: "Shikoku -> Beppu",
        text: "Train + ferry, ou train via Kokura. Arrivee l'apres-midi, Enfers de Beppu et onsen le soir.",
        chips: ["Ferry / train", "Enfers", "Onsen"],
        points: [[33.2233, 132.5606], [33.2796, 131.5007]]
      },
      {
        day: 11,
        date: "15 juil",
        title: "Beppu -> Yufuin -> Fukuoka",
        text: "Matin vers Yufuin, puis Fukuoka dans l'apres-midi. Soir ramen Hakata.",
        chips: ["1 h + 2-2.5 h", "Yufuin", "Ramen Hakata"],
        points: [[33.2796, 131.5007], [33.2651, 131.3587], [33.5902, 130.4017]]
      },
      {
        day: 12,
        date: "16 juil",
        title: "Fukuoka -> Aso",
        text: "Train jusqu'a la zone Aso, puis voiture recommandee pour caldeira et points de vue. Nuit dans la region.",
        chips: ["2.5-4 h", "Voiture", "Caldeira"],
        points: [[33.5902, 130.4017], [32.9516, 131.1214]]
      },
      {
        day: 13,
        date: "17 juil",
        title: "Aso -> Kumamoto",
        text: "Court trajet vers Kumamoto. Chateau, jardins Suizenji, marche local et fin du road-trip.",
        chips: ["1-1.5 h", "Chateau", "Fin du voyage"],
        points: [[32.9516, 131.1214], [32.8031, 130.7079]]
      }
    ];

    const itinerary = document.querySelector("#itinerary");
    const cards = days.map((item) => {
      const card = document.createElement("article");
      card.className = "day-card";
      card.id = `jour-${item.day}`;
      card.dataset.day = item.day;
      card.innerHTML = `
        <div class="day-head">
          <div class="day-num">${item.day}</div>
          <div>
            <div class="day-date">Jour ${item.day} - ${item.date}</div>
            <h2>${item.title}</h2>
          </div>
        </div>
        <div class="day-body">
          <div>${item.text}</div>
          <div class="chips">
            ${item.chips.map((chip, index) => `<span class="chip ${["blue", "gold", "red"][index % 3]}">${chip}</span>`).join("")}
          </div>
        </div>
      `;
      itinerary.append(card);
      return card;
    });

    const mapDay = document.querySelector("#mapDay");
    const mapLabel = document.querySelector("#mapLabel");
    const routePoints = [];
    days.forEach((item) => {
      item.points.forEach((point) => {
        if (!samePoint(routePoints.at(-1), point)) routePoints.push(point);
      });
      item.routeEndIndex = routePoints.length - 1;
    });
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const markers = new Map();
    let map;
    let progressLine;

    function samePoint(a, b) {
      return Boolean(a && b && a[0] === b[0] && a[1] === b[1]);
    }

    function setActive(dayNumber, pan = true) {
      const item = days.find((day) => day.day === dayNumber);
      if (!item) return;

      cards.forEach((card) => card.classList.toggle("active", Number(card.dataset.day) === dayNumber));
      markers.forEach((marker, day) => {
        marker.getElement()?.querySelector(".stop-pin")?.classList.toggle("active", day === dayNumber);
      });

      mapDay.textContent = `Jour ${item.day} - ${item.date}`;
      mapLabel.textContent = item.title;

      if (progressLine) {
        progressLine.setLatLngs(routePoints.slice(0, item.routeEndIndex + 1));
      }

      if (pan && map) {
        const bounds = L.latLngBounds(item.points);
        map.flyToBounds(bounds.pad(0.72), { duration: prefersReducedMotion ? 0 : 0.8, maxZoom: 9 });
      }
    }

    function initMap() {
      if (!window.L) {
        document.querySelector("#map").textContent = "Carte indisponible hors connexion.";
        return;
      }

      map = L.map("map", {
        scrollWheelZoom: false,
        zoomControl: true
      });

      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 18,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
      }).addTo(map);

      L.polyline(routePoints, {
        color: "#246b86",
        weight: 4,
        opacity: 0.28
      }).addTo(map);

      progressLine = L.polyline([routePoints[0]], {
        color: "#c7462b",
        weight: 5,
        opacity: 0.95
      }).addTo(map);

      days.forEach((item) => {
        const marker = L.marker(item.marker || item.points.at(-1), {
          icon: L.divIcon({
            html: `<span class="stop-pin">${item.day}</span>`,
            className: "",
            iconSize: [32, 32],
            iconAnchor: [16, 16]
          })
        }).addTo(map);

        marker.on("click", () => {
          document.querySelector(`#jour-${item.day}`).scrollIntoView({ behavior: prefersReducedMotion ? "auto" : "smooth", block: "start" });
          setActive(item.day);
        });

        markers.set(item.day, marker);
      });

      map.fitBounds(L.latLngBounds(routePoints).pad(0.12));
      setActive(1, false);
    }

    initMap();

    const observer = new IntersectionObserver((entries) => {
      const visible = entries
        .filter((entry) => entry.isIntersecting)
        .sort((a, b) => b.intersectionRatio - a.intersectionRatio)[0];
      if (visible) setActive(Number(visible.target.dataset.day));
    }, {
      rootMargin: "-25% 0px -45% 0px",
      threshold: [0.25, 0.55, 0.85]
    });

    cards.forEach((card) => observer.observe(card));
  </script>
</body>
</html>
